name: Build & deploy to GitHub Pages

# Automatické nasazení na Pages je vypnuté — web hostuje Vercel (vercel.json).
# Tento workflow zůstává jen jako ruční záloha: Actions → tento workflow → Run workflow.
on:
  workflow_dispatch:

# Oprávnění potřebná pro nasazení na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Povolit vždy jen jedno nasazení najednou; rozdělané zrušit
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build site
        run: python build.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
